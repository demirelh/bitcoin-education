  translate:
    mode: per_story
    register: formal_news
    clean_moderator: true
  tts:
    voice_id: ""
    stability: 0.6
    style: 0.0
  render:
    accent_color: "#004B87"
youtube:
  category_id: "25"
  default_language: tr
  default_privacy: unlisted
  tags: [haberler, almanya, türkçe, tagesschau]
review_gates: {}
prompt_namespace: tagesschau_tr
